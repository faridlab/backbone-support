server:
  host: 0.0.0.0
  port: 8080
  grpc_port: 50051
database:
  url: postgresql://root:password@localhost:5432/skeletondb
  max_connections: 10
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600
logging:
  level: info
  format: json
  file: logs/support.log
module:
  name: support
  enabled: true
features:
  soft_delete: true
  state_machines: false
  workflows: false
entities:
  issue:
    collection: issues
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  service_level_agreement:
    collection: service_level_agreements
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  service_level_priority:
    collection: service_level_priorities
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  warranty_claim:
    collection: warranty_claims
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
tracing:
  enabled: true
  exporter: otlp
  endpoint: http://localhost:4317
metrics:
  enabled: true
  endpoint: /metrics
  port: 9090
